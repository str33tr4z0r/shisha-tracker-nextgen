# k8s/couchdb-pv-local-multi.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: shisha-couchdb-pv-1
  labels:
    app: shisha-couchdb
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /mnt/data/shisha-couchdb-1
---
