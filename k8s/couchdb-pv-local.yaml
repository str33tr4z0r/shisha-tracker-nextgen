apiVersion: v1
kind: PersistentVolume
metadata:
  name: shisha-couchdb-pv-0
  labels:
    app: shisha-couchdb
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /var/lib/shisha/couchdb-0
    type: DirectoryOrCreate
  claimRef:
    namespace: shisha
    name: couchdb-data-shisha-couchdb-0