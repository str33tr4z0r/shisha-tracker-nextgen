# Headless Service + StatefulSet für CouchDB Cluster (StatefulSet + join script)
# - initial replicas: 1
# - storageClassName: standard (dynamische PVCs)
# Hinweise:
# - Setze das Secret 'shisha-couchdb-admin' mit keys 'username' und 'password' vorher in Namespace 'shisha'.
# - Testen in dev: replicas >1 nur auf Cluster mit StorageClass 'standard'.
---
apiVersion: v1
kind: Service
metadata:
  name: shisha-couchdb-headless
  namespace: shisha
  labels:
    app: shisha-couchdb
spec:
  clusterIP: None
  ports:
    - port: 5984
      name: http
  selector:
    app: shisha-couchdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shisha-couchdb
  namespace: shisha
  labels:
    app: shisha-couchdb
spec:
  serviceName: shisha-couchdb-headless
  replicas: 1
  selector:
    matchLabels:
      app: shisha-couchdb
  template:
    metadata:
      labels:
        app: shisha-couchdb
    spec:
      # Add initContainer to generate vm.args + local.ini with per-pod Erlang node name.
      # This writes files into an emptyDir which is mounted into the CouchDB etc dir
      # so Erlang has a proper node name (not nonode@nohost) and a shared cookie.
      terminationGracePeriodSeconds: 120
      initContainers:
        - name: gen-vmargs
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # create vm.args with nodename derived from POD_IP (valid for Erlang longnames)
              cat > /work/vm.args <<EOF
              -name couchdb@${POD_IP}
              -setcookie couchdb-cluster-cookie
              EOF
              # ensure etc layout and create local.ini + local.d
              mkdir -p /work/local.d
              cat > /work/local.ini <<EOF
              [chttpd]
              bind_address = 0.0.0.0
              [couchdb]
              database_dir = /opt/couchdb/data
              [admins]
              # admin user taken from secret at runtime; leave empty here
              EOF
              # create an empty docker.ini to avoid touches failing in container startup
              touch /work/local.d/docker.ini
              chmod -R 0755 /work || true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: couchdb-config
              mountPath: /work
      # expose an emptyDir here so initContainer can write vm.args/local.ini into /opt/couchdb/etc
      volumes:
        - name: couchdb-config
          emptyDir: {}
      containers:
        - name: couchdb
          image: couchdb:3.2.2
          imagePullPolicy: IfNotPresent
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: shisha-couchdb-admin
                  key: username
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shisha-couchdb-admin
                  key: password
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_HOST
              value: shisha-couchdb-headless
          ports:
            - containerPort: 5984
              name: http
          readinessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 2
          volumeMounts:
            - name: couchdb-data
              mountPath: /opt/couchdb/data
            - name: couchdb-config
              mountPath: /opt/couchdb/etc
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # minimal join script (waits until local node is up)
                    sleep 5
                    until curl -sSf "http://127.0.0.1:5984/" >/dev/null 2>&1; do
                      sleep 2
                    done
                    # derive ordinal
                    if echo "$POD_NAME" | grep -qE "-[0-9]+$"; then
                      ORDINAL=$(echo "$POD_NAME" | sed -E 's/.*-([0-9]+)$/\1/')
                    else
                      ORDINAL=0
                    fi
                    if [ "$ORDINAL" -eq 0 ]; then
                      echo "I am pod-0; coordinator"
                      exit 0
                    fi
                    COORD="shisha-couchdb-0.shisha-couchdb-headless"
                    until curl -sSf "http://$COORD:5984/_up" >/dev/null 2>&1; do
                      sleep 2
                    done
                    SELF_HOST="${POD_NAME}.shisha-couchdb-headless"
                    # request add_node
                    curl -sS -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -X POST "http://$COORD:5984/_cluster_setup" -H "Content-Type: application/json" -d "{\"action\":\"add_node\",\"host\":\"$SELF_HOST\",\"port\":5984}" || true
                    curl -sS -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -X POST "http://$COORD:5984/_cluster_setup" -H "Content-Type: application/json" -d '{"action":"finish_cluster"}' || true
 
  volumeClaimTemplates:
    - metadata:
        name: couchdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        storageClassName: standard