# Headless Service + StatefulSet für CouchDB Cluster (StatefulSet + join script)
# - initial replicas: 1
# - storageClassName: standard (dynamische PVCs)
# Hinweise:
# - Setze das Secret 'shisha-couchdb-admin' mit keys 'username' und 'password' vorher in Namespace 'shisha'.
# - Testen in dev: replicas >1 nur auf Cluster mit StorageClass 'standard'.
---
apiVersion: v1
kind: Service
metadata:
  name: shisha-couchdb-headless
  namespace: shisha
  labels:
    app: shisha-couchdb
spec:
  clusterIP: None
  ports:
    - port: 5984
      name: http
  selector:
    app: shisha-couchdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shisha-couchdb
  namespace: shisha
  labels:
    app: shisha-couchdb
spec:
  serviceName: shisha-couchdb-headless
  replicas: 1
  selector:
    matchLabels:
      app: shisha-couchdb
  template:
    metadata:
      labels:
        app: shisha-couchdb
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: couchdb
          image: couchdb:3.2.2
          imagePullPolicy: IfNotPresent
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: shisha-couchdb-admin
                  key: username
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shisha-couchdb-admin
                  key: password
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_HOST
              value: shisha-couchdb-headless
          ports:
            - containerPort: 5984
              name: http
          readinessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /_up
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 2
          volumeMounts:
            - name: couchdb-data
              mountPath: /opt/couchdb/data
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -eu
                    retry() {
                      n=0
                      until [ $n -ge "${RETRIES:-30}" ]; do
                        "$@" && return 0
                        n=$((n+1))
                        sleep "${RETRY_INTERVAL:-2}"
                      done
                      return 1
                    }

                    echo "waiting for local couchdb..."
                    RETRIES=30; RETRY_INTERVAL=2
                    retry curl -sSf "http://127.0.0.1:5984/" >/dev/null

                    if echo "$POD_NAME" | grep -qE "-[0-9]+$"; then
                      ORDINAL=$(echo "$POD_NAME" | sed -E 's/.*-([0-9]+)$/\1/')
                    else
                      ORDINAL=0
                    fi

                    if [ "$ORDINAL" -eq 0 ]; then
                      echo "I am pod-0; initialize as coordinator"
                      exit 0
                    fi

                    COORDINATOR_HOST="shisha-couchdb-0.shisha-couchdb-headless"
                    echo "waiting for coordinator $COORDINATOR_HOST..."
                    RETRIES=60; RETRY_INTERVAL=2
                    retry curl -sSf "http://$COORDINATOR_HOST:5984/_up" >/dev/null

                    SELF_HOST="${POD_NAME}.shisha-couchdb-headless"
                    echo "requesting coordinator to add node $SELF_HOST..."
                    ADD_PAYLOAD=$(cat <<JSON
{"action":"add_node","host":"$SELF_HOST","port":5984,"username":"$COUCHDB_USER","password":"$COUCHDB_PASSWORD"}
JSON
)
                    if retry curl -sS -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -X POST "http://$COORDINATOR_HOST:5984/_cluster_setup" -H "Content-Type: application/json" -d "$ADD_PAYLOAD"; then
                      echo "add_node request sent"
                    else
                      echo "add_node request failed" >&2
                      exit 1
                    fi

                    FINISH_PAYLOAD='{"action":"finish_cluster"}'
                    echo "finishing cluster on coordinator..."
                    if retry curl -sS -u "$COUCHDB_USER:$COUCHDB_PASSWORD" -X POST "http://$COORDINATOR_HOST:5984/_cluster_setup" -H "Content-Type: application/json" -d "$FINISH_PAYLOAD"; then
                      echo "finish_cluster done"
                    else
                      echo "finish_cluster failed or unnecessary"
                    fi

  volumeClaimTemplates:
    - metadata:
        name: couchdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        storageClassName: standard